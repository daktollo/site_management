# PostgreSQL for Site Management. See docs/setup.md.
# Usage: docker compose -f docker/docker-compose.yml up -d
services:
  db:
    image: postgres:16
    container_name: site_management_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-site_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-site_management}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Scripts in ../db/init run automatically on first start (empty volume).
      - ../db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-site_admin} -d ${POSTGRES_DB:-site_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
