# Production stack — builds backend + frontend images and runs PostgreSQL.
# Base images (node, nginx, postgres) all have arm64 variants, so this builds
# natively on a Raspberry Pi 5. See docs/deploy-raspberry-pi.md.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-site_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-site_management}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Schema + seed run automatically on first start (empty volume).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-site_admin} -d ${POSTGRES_DB:-site_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-site_admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me}
      PGDATABASE: ${POSTGRES_DB:-site_management}
      JWT_SECRET: ${JWT_SECRET:-please_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  db_data:
